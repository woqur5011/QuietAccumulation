name: 데이터 수집 (full)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * 1-5'   # 장시작 09:30 KST
    - cron: '30 6 * * 1-5'   # 장마감 15:30 KST

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: 데이터 수집 (full ~30분)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python collector.py --full 2>&1 | tail -30

      - name: 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.csv
          [ -f data/latest_summary.json ] && git add data/latest_summary.json || true
          git diff --cached --quiet || \
            git commit -m "data: $(date +'%Y-%m-%d %H:%M') [full] auto-collect"
          for i in 1 2 3; do
            git pull --rebase origin main && \
            git push origin HEAD:main && \
            git push origin HEAD:master && break || sleep 10
          done
